architecture:
  activation: relu
  bottleneck_channels: 32
  dropout_probability: 0.0
  encoder_channels:
  - 8
  - 16
  - 32
  group_norm_num_groups: 8
  input_channels: 1
  kernel_size: 3
  normalization: none
  upsampling_mode: bilinear
  use_attention_gates: false
  use_depthwise_separable_convolutions: true
  use_residual_connections: false
training:
  batch_size: 64
  data_root: data/bagls
  dataset: BAGLS
  epochs: 100
  hypothesis: Depth-wise separable layers does not lose much in Dice.
  image_size: 256
  learning_rate: 0.001
  max_samples: 5000
  notes: comparing depth-wise separable conv with bagls.
  seed: 44
  use_color_input: false
  weight_decay: 0.0001

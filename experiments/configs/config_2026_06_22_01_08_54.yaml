architecture:
  activation: h_swish
  bottleneck_channels: 64
  dropout_probability: 0.0
  encoder_channels:
  - 8
  - 16
  - 32
  - 64
  group_norm_num_groups: 8
  input_channels: 1
  kernel_size: 3
  normalization: none
  upsampling_mode: nearest_neighbor
  use_attention_gates: false
  use_depthwise_separable_convolutions: true
  use_residual_connections: true
training:
  batch_size: 64
  cyclic_learning_rate_half_cycle_epochs: 2
  cyclic_learning_rate_maximum: 0.001
  cyclic_learning_rate_minimum: 1.0e-06
  data_root: data/EMSegmentation
  dataset: EMSegmentation
  early_stopping_minimum_improvement_delta: 0.001
  early_stopping_patience: 10
  epochs: 100
  hypothesis: Depth-wise separable layers does not lose much in Dice.
  image_size: 256
  learning_rate: 0.001
  notes: emseg + no norm + ds conv 4 blocks + paper's optimization
  seed: 44
  use_color_input: false
  use_cyclic_learning_rate: true
  weight_decay: 0.0001

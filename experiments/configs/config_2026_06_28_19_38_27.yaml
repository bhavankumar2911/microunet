architecture:
  activation: h_swish
  bottleneck_channels: 52
  dropout_probability: 0.0
  encoder_channels:
  - 8
  - 16
  - 32
  group_norm_num_groups: 8
  input_channels: 3
  kernel_size: 3
  normalization: batch_norm
  skip_connection_mode: concat
  upsampling_mode: nearest_neighbor
  use_attention_gates: false
  use_depthwise_separable_convolutions: true
  use_residual_connections: false
  use_single_convolution_per_block: false
training:
  batch_size: 64
  cyclic_learning_rate_half_cycle_epochs: 2
  cyclic_learning_rate_maximum: 0.001
  cyclic_learning_rate_minimum: 1.0e-06
  data_root: data/Wbc
  dataset: Wbc
  early_stopping_minimum_improvement_delta: 0.001
  early_stopping_patience: 10
  epochs: 100
  hypothesis: Using depth-wise separable convolution reduces parameters without losing
    much in dice.
  image_size: 256
  learning_rate: 0.001
  notes: baseline vs depth-wise separable convolution
  seed: 44
  use_color_input: true
  use_cyclic_learning_rate: false
  weight_decay: 0.0001

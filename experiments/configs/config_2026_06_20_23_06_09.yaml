architecture:
  activation: relu
  bottleneck_channels: 64
  dropout_probability: 0.0
  encoder_channels:
  - 8
  - 16
  - 32
  - 64
  group_norm_num_groups: 8
  input_channels: 3
  kernel_size: 3
  normalization: none
  upsampling_mode: bilinear
  use_attention_gates: false
  use_depthwise_separable_convolutions: true
  use_residual_connections: false
training:
  batch_size: 64
  data_root: data/Polyp
  dataset: Polyp
  early_stopping_minimum_improvement_delta: 0.001
  early_stopping_patience: 20
  epochs: 200
  hypothesis: Depth-wise separable layers does not lose much in Dice.
  image_size: 256
  learning_rate: 0.001
  notes: polyp + no norm + ds conv 4 blocks
  seed: 44
  use_color_input: true
  weight_decay: 0.0001

architecture:
  encoder_channels: [6, 12, 24]        
  bottleneck_channels: 48
  normalization: batch_norm         
  group_norm_num_groups: 8          
  activation: relu                  
  upsampling_mode: transposed_conv  
  use_residual_connections: false   
  use_attention_gates: true        
  dropout_probability: 0.0          

training:
  learning_rate: 0.001
  weight_decay: 1e-4
  batch_size: 32
  epochs: 15
  dataset: BAGLS
  image_size: 256
  max_samples: 10000   
  hypothesis: "Baseline micro U-Net with BatchNorm, no attention, no residual"
  notes: "baseline"
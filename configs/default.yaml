architecture:
  encoder_channels: [8, 16, 32]
  bottleneck_channels: 32
  kernel_size: 3
  normalization: none
  group_norm_num_groups: 8
  activation: relu
  upsampling_mode: bilinear
  use_residual_connections: false
  use_attention_gates: false
  dropout_probability: 0.0

training:
  data_root: data/Polyp
  learning_rate: 0.001
  weight_decay: 1e-4
  batch_size: 64
  epochs: 45
  dataset: Polyp
  image_size: 256
  # max_samples: none
  hypothesis: "Batch Normalization makes the learning stable."
  notes: "Using EM - Mitochondria Dataset for Hypothesis 1"